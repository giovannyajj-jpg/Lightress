<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightStress | Servidor PocketMine</title>
    <style>
        /* CSS Moderno, sin librerías pesadas para evitar el LAG */
        :root {
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.3);
            --bg-dark: #0a0c10;
            --bg-card: #121620;
            --text: #f5f5f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Fondo de partículas sutil sin JavaScript (Cero Lag) */
        .bg-glow {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at center, var(--primary-glow) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        /* EFECTO DE ESCRITURA (Typing Effect) */
        .typing-container {
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #ffffff;
            display: inline-block;
        }

        .typing-text {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
            border-right: 4px solid var(--primary);
            white-space: nowrap;
            animation: typing 3.5s steps(25, end) infinite alternate, blink 0.75s step-end infinite;
            overflow: hidden;
            display: inline-block;
            vertical-align: bottom;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--primary); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8a99ad;
            margin-bottom: 2.5rem;
        }

        /* TARJETAS DE INFORMACIÓN */
        .grid-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.1);
        }

        .card h3 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .card p {
            color: #b0b8c4;
            font-size: 0.95rem;
        }

        /* BOTÓN DE COPIAR IP */
        .ip-box {
            background: #161b26;
            border: 2px dashed var(--primary);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .ip-box:hover {
            background: rgba(0, 210, 255, 0.1);
        }

        .ip-text {
            color: #fff;
            font-size: 1.2rem;
        }

        .click-to-copy {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Alerta flotante */
        .alert {
            position: fixed;
            bottom: -20px;
            background: var(--primary);
            color: #000;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .alert.show {
            bottom: 20px;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <!-- Entrada Épica con Efecto de Escritura -->
        <div class="typing-container">
            <span class="typing-text">LIGHTSTRESS</span>
        </div>
        
        <p class="subtitle">El servidor definitivo para MCPE 0.15.10 y 0.14.x</p>

        <!-- Información del Servidor -->
        <div class="grid-info">
            <div class="card">
                <h3>Versiones</h3>
                <p>0.15.10 x 0.14.x</p>
            </div>
            <div class="card">
                <h3>Rendimiento</h3>
                <p>Host 24/7 de Alta Calidad, 0 Lag</p>
            </div>
            <div class="card">
                <h3>Comunidad</h3>
                <p>Survival, PvP y economía activa</p>
            </div>
        </div>

        <!-- Botón interactivo para copiar IP -->
        <div class="ip-box" onclick="copyIP()">
            <div>
                <p class="ip-text" id="server-ip">play.lightstress.net</p>
                <p style="color: #657786; font-size: 0.9rem;">Puerto: 19132</p>
            </div>
            <span class="click-to-copy">¡Copiar IP!</span>
        </div>
    </div>

    <div class="alert" id="alert">¡IP Copiada al portapapeles!</div>

    <script>
        // Función rápida y ligera para copiar la IP
        function copyIP() {
            const ipText = document.getElementById('server-ip').innerText;
            navigator.clipboard.writeText(ipText).then(() => {
                const alert = document.getElementById('alert');
                alert.classList.add('show');
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 2000);
            });
        }
    </script>
</body>
</html>
