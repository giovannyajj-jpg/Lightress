<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBACKUPS | Real Cloud Database</title>
    <style>
        :root { --primary: #00d2ff; --primary-glow: rgba(0, 210, 255, 0.3); --bg-dark: #040712; --bg-panel: #0a101f; --bg-input: #121a2e; --text-main: #f1f5f9; --text-muted: #64748b; --accent-green: #00ffaa; --accent-red: #ff4a4a; --accent-gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .app-page { display: flex; flex-direction: column; min-height: 100vh; width: 100%; }
        .hidden { display: none !important; }
        header { background: rgba(10, 16, 31, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0, 210, 255, 0.1); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 1.5px; color: #fff; text-shadow: 0 0 12px var(--primary-glow); }
        .logo span { color: var(--primary); }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .user-nav-box { display: flex; align-items: center; gap: 10px; background: var(--bg-input); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .pfp-mini { width: 25px; height: 25px; border-radius: 50%; object-fit: cover; background: #2a354d; }
        .menu-dots-btn { background: none; border: none; color: #fff; font-size: 1.6rem; cursor: pointer; padding: 0 5px; }
        .hero { text-align: center; padding: 25px 20px 10px 20px; background: radial-gradient(circle at top, var(--primary-glow) 0%, transparent 60%); }
        .typing-container { font-size: 2.2rem; font-weight: 900; }
        .typing-text { color: var(--primary); border-right: 3px solid var(--primary); white-space: nowrap; overflow: hidden; display: inline-block; animation: typing 2.5s steps(8, end) infinite alternate, blink 0.75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--primary) } }
        .dashboard { max-width: 1200px; width: 100%; margin: 0 auto; padding: 15px; display: grid; grid-template-columns: 360px 1fr; gap: 20px; flex: 1; }
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        .glass-panel { background: var(--bg-panel); border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); height: fit-content; }
        .glass-panel h3 { font-size: 1.15rem; color: #fff; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 12px; }
        input, select, textarea { background: var(--bg-input); border: 1px solid rgba(255, 255, 255, 0.05); padding: 11px; border-radius: 8px; color: #fff; outline: none; font-size: 0.9rem; }
        .auth-btn { background: linear-gradient(135deg, var(--primary), #0077ff); color: #040712; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; text-align: center;}
        .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 0 12px var(--primary); }
        .forum-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: var(--bg-panel); color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.02); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .tab-btn.active, .tab-btn:hover { color: #fff; background: var(--primary); }
        .feed-section { display: none; }
        .feed-section.active { display: flex; flex-direction: column; gap: 12px; }
        .archive-card { background: var(--bg-panel); border-radius: 12px; padding: 18px; border: 1px solid rgba(255, 255, 255, 0.01); display: flex; flex-direction: column; gap: 10px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .uploader-badge { background: rgba(0, 210, 255, 0.1); color: var(--primary); font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; }
        .admin-badge { background: rgba(255, 74, 74, 0.15) !important; color: var(--accent-red) !important; border: 1px solid var(--accent-red); }
        .card-desc { color: #94a3b8; font-size: 0.9rem; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.02); padding-top: 10px; }
        .dl-btn { background: #101f38; color: var(--primary); border: 1px solid var(--primary); padding: 6px 14px; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.85rem; }
        .delete-btn { background: rgba(255, 74, 74, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 380px; height: 100vh; background: var(--bg-panel); border-left: 1px solid rgba(0, 210, 255, 0.1); box-shadow: -10px 0 30px rgba(0,0,0,0.6); z-index: 200; display: flex; flex-direction: column; transition: right 0.3s; }
        .sidebar.open { right: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-tabs { display: flex; background: var(--bg-dark); padding: 5px; margin: 10px 20px; border-radius: 8px; }
        .sidebar-tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 8px; cursor: pointer; font-weight: bold; }
        .sidebar-tab-btn.active { background: var(--bg-input); color: #fff; border-radius: 6px; }
        .sidebar-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .chat-messages { flex: 1; background: var(--bg-dark); border-radius: 8px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; max-height: 400px; }
        .chat-msg { font-size: 0.85rem; background: rgba(255,255,255,0.02); padding: 6px 10px; border-radius: 6px; }
        .profile-card { text-align: center; background: var(--bg-dark); padding: 15px; border-radius: 12px; }
        .pfp-large { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: var(--bg-input); padding: 8px; border-radius: 6px; font-size: 0.8rem; }
        .stat-item span { display: block; font-size: 1rem; color: var(--accent-gold); font-weight: bold; }
        .auth-fullscreen { background-color: var(--bg-dark); width: 100vw; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: fixed; top: 0; left: 0; z-index: 1000; }
        .auth-box { background: var(--bg-panel); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; }
        .auth-tabs { display: flex; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .auth-tab { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; font-weight: 700; padding-bottom: 8px; cursor: pointer; }
        .auth-tab.active { color: #fff; border-bottom: 2px solid var(--primary); }
        @media (max-width: 400px) { .sidebar { width: 100vw; } }
    </style>
</head>
<body>
    <div id="mainPage" class="app-page">
        <header>
            <div class="logo">S<span>BACKUPS</span></div>
            <div class="nav-right">
                <button class="auth-btn" id="loginTrigger" onclick="navigateTo('authPage')">Ingresar / Registrarse</button>
                <div class="user-nav-box hidden" id="userBox">
                    <img src="" class="pfp-mini" id="myNavPfp">
                    <span id="myNavName" style="font-size:0.85rem; font-weight:700;"></span>
                </div>
                <button class="menu-dots-btn" onclick="toggleSidebar(true)">⋮</button>
            </div>
        </header>
        <div id="adminPanel" class="glass-panel hidden" style="max-width:1200px; width:calc(100% - 30px); margin: 15px auto 0 auto; border: 1px dashed var(--accent-red);">
            <h3 style="color: var(--accent-red); border-left-color: var(--accent-red);">🛡️ Panel Global Administrativo (Astrx)</h3>
            <p style="font-size: 0.85rem; color:var(--text-muted);">Como Administrador principal de SBACKUPS, tienes el poder de borrar cualquier archivo o servidor directamente desde las tarjetas de abajo en tiempo real.</p>
        </div>
        <div class="hero">
            <div class="typing-container"><span class="typing-text">SBACKUPS</span></div>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Cloud Database en Vivo a través de Google Sheets</p>
        </div>
        <div class="dashboard">
            <div class="glass-panel">
                <h3>Publicar Contenido</h3>
                <div class="form-group">
                    <input type="text" id="postTitle" placeholder="Título o Nombre del Servidor">
                    <select id="postCategory">
                        <option value="plugins">🔌 Plugins (.phar / .zip)</option>
                        <option value="mapas">🗺️ Mapas & Mundos</option>
                        <option value="cores">📦 Cores Estables</option>
                        <option value="servidores">🖥️ Servidor Minecraft PE</option>
                    </select>
                    <textarea id="postDesc" rows="3" placeholder="Descripción..."></textarea>
                    <input type="text" id="postLink" placeholder="Enlace de descarga (Google Drive / Directo)">
                    <button class="auth-btn" style="padding: 11px;" onclick="publishPost()">Publicar en la Base de Datos</button>
                </div>
            </div>
            <div>
                <div class="forum-tabs">
                    <button class="tab-btn active" onclick="switchTab('plugins')">Plugins</button>
                    <button class="tab-btn" onclick="switchTab('mapas')">Mapas</button>
                    <button class="tab-btn" onclick="switchTab('cores')">Cores</button>
                    <button class="tab-btn" onclick="switchTab('servidores')">Servidores</button>
                </div>
                <div id="plugins" class="feed-section active"></div>
                <div id="mapas" class="feed-section"></div>
                <div id="cores" class="feed-section"></div>
                <div id="servidores" class="feed-section"></div>
            </div>
