    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let apiReady = false;
        let musicStarted = false;

        // La API llama a esta función automáticamente al cargar la página
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-audio-player', {
                height: '200',
                width: '300',
                videoId: 'GX8Hg6kWQYI', // ID de Moonlight de XXXTentacion
                playerVars: {
                    'autoplay': 0,
                    'loop': 1,
                    'playlist': 'GX8Hg6kWQYI',
                    'controls': 0,
                    'disablekb': 1
                },
                events: {
                    'onReady': function() {
                        apiReady = true;
                    }
                }
            });
        }

        // Al hacer el primer clic o toque en cualquier parte de la pantalla, la música inicia al instante
        document.body.addEventListener('click', function() {
            if (apiReady && player && !musicStarted) {
                player.playVideo();
                musicStarted = true;
            }
        });
    </script>
