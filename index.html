<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕳𝖊𝖆𝖛𝖞</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome para los íconos de redes sociales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Reproductor de YouTube Oculto (Se activará al hacer clic) -->
    <iframe id="bgMusic" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>

    <!-- Fondo de pantalla con efecto de desenfoque opcional -->
    <div class="background-overlay"></div>

    <!-- Efecto de nieve -->
    <div class="snowflakes" aria-hidden="true">
        <div class="snowflake">💤</div><div class="snowflake">❆</div><div class="snowflake">❅</div>
        <div class="snowflake">💤</div><div class="snowflake">❅</div><div class="snowflake">❆</div>
        <div class="snowflake">💤</div><div class="snowflake">❆</div><div class="snowflake">❅</div>
    </div>

    <!-- Contenedor principal del perfil -->
    <div class="profile-container">
        <!-- Foto de perfil con borde decorativo -->
        <div class="profile-pic-wrapper">
            <img src="https://cdn.discordapp.com/avatars/1249562581811593227/e2ecd7dbdf95f91ab30a9ccd818dc601.png?size=2048" alt="Foto de perfil" class="profile-pic">
        </div>

        <h1 class="username">𝕳𝖊𝖆𝖛𝖞</h1>

        <div class="handles">
            <p>@.666is / @SnazzyX2630</p>
        </div>

        <div class="location">
            <i class="fas fa-map-marker-alt"></i> From Ecuador 🇪🇨
        </div>

        <!-- Widget de Estado (Estilo Discord) -->
        <div class="status-widget glass">
            <img src="https://cdn.discordapp.com/avatars/1249562581811593227/e2ecd7dbdf95f91ab30a9ccd818dc601.png?size=2048" alt="Avatar Status" class="status-avatar">
            <div class="status-info">
                <div class="status-name">.666is <i class="fa-solid fa-bolt"></i> <i class="fa-brands fa-discord"></i></div>
                <div class="status-time">last seen 4 hours ago</div>
            </div>
        </div>

        <!-- Botones de Redes Sociales -->
        <div class="social-links">
            <a href="TU_LINK_DE_DISCORD" target="_blank" class="glass-btn"><i class="fab fa-discord"></i></a>
            <a href="TU_LINK_DE_YOUTUBE" target="_blank" class="glass-btn"><i class="fab fa-youtube"></i></a>
            <a href="TU_LINK_DE_SPOTIFY" target="_blank" class="glass-btn"><i class="fab fa-spotify"></i></a>
            <a href="TU_LINK_DE_TIKTOK" target="_blank" class="glass-btn"><i class="fab fa-tiktok"></i></a>
        </div>

        <!-- Contador de vistas -->
        <div class="views-counter">
            <i class="fas fa-eye"></i> 1807
        </div>
    </div>

    <script>
        // Este script detecta el primer clic en la página y arranca la música de YouTube de forma segura
        let musicStarted = false;
        
        document.body.addEventListener('click', function() {
            if (!musicStarted) {
                // Aquí ya está puesto el ID exacto de tu video (GX8Hg6kWQYI)
                document.getElementById("bgMusic").src = "https://www.youtube.com/embed/GX8Hg6kWQYI?autoplay=1&loop=1&playlist=GX8Hg6kWQYI";
                musicStarted = true;
            }
        });
    </script>
</body>
</html>
