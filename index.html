<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕳𝖊𝖆𝖛𝖞</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilo rápido para tu nueva descripción */
        .bio {
            font-size: 15px;
            color: #b3b3b3;
            margin-top: -5px;
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div style="position: absolute; left: -9999px; top: -9999px; width: 300px; height: 200px; opacity: 0.01; pointer-events: none;">
        <div id="yt-audio-player"></div>
    </div>

    <div class="background-overlay"></div>

    <div class="snowflakes" aria-hidden="true">
        <div class="snowflake">💤</div><div class="snowflake">❆</div><div class="snowflake">❅</div>
        <div class="snowflake">💤</div><div class="snowflake">❅</div><div class="snowflake">❆</div>
        <div class="snowflake">💤</div><div class="snowflake">❆</div><div class="snowflake">❅</div>
    </div>

    <div class="profile-container">
        <div class="profile-pic-wrapper">
            <img id="user-avatar" src="https://cdn.discordapp.com/avatars/1249562581811593227/e2ecd7dbdf95f91ab30a9ccd818dc601.png?size=2048" alt="Foto de perfil" class="profile-pic">
        </div>

        <h1 class="username">𝕳𝖊𝖆𝖛𝖞</h1>

        <div class="handles">
            <p>@.666is / @SnazzyX2630</p>
        </div>

        <p class="bio">NodeJS dev and css</p>

        <div class="location">
            <i class="fas fa-map-marker-alt"></i> From Ecuador 🇪🇨
        </div>

        <div class="status-widget glass">
            <img id="status-avatar" src="https://cdn.discordapp.com/avatars/1249562581811593227/e2ecd7dbdf95f91ab30a9ccd818dc601.png?size=2048" alt="Avatar Status" class="status-avatar">
            <div class="status-info">
                <div class="status-name">.666is <i class="fa-solid fa-bolt"></i> <i class="fa-brands fa-discord"></i></div>
                <div class="status-time" id="discord-status">Cargando estado...</div>
            </div>
        </div>

        <div class="social-links">
            <a href="TU_LINK_DE_DISCORD" target="_blank" class="glass-btn"><i class="fab fa-discord"></i></a>
            <a href="TU_LINK_DE_YOUTUBE" target="_blank" class="glass-btn"><i class="fab fa-youtube"></i></a>
            <a href="TU_LINK_DE_SPOTIFY" target="_blank" class="glass-btn"><i class="fab fa-spotify"></i></a>
            <a href="TU_LINK_DE_TIKTOK" target="_blank" class="glass-btn"><i class="fab fa-tiktok"></i></a>
        </div>

        <div class="views-counter">
            <i class="fas fa-eye"></i> 1807
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let musicStarted = false;
        const discordUserID = "1249562581811593227";

        // 1. CONTROL DE MÚSICA (Carga, Actualización y Toques)
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-audio-player', {
                height: '200',
                width: '300',
                videoId: 'GX8Hg6kWQYI',
                playerVars: {
                    'autoplay': 1, // Intenta reproducir directo al conectar/actualizar
                    'loop': 1,
                    'playlist': 'GX8Hg6kWQYI',
                    'controls': 0,
                    'disablekb': 1
                },
                events: {
                    'onReady': function(event) {
                        // Intento de reproducción forzada al cargar la API
                        event.target.playVideo();
                    },
                    'onStateChange': function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            musicStarted = true;
                        }
                    }
                }
            });
        }

        // Activador por interacciones físicas (Toques, clics, teclado)
        const arrancarMusicaForzado = () => {
            if (player && !musicStarted) {
                player.playVideo();
                musicStarted = true;
            }
        };

        document.addEventListener('click', arrancarMusicaForzado);
        document.addEventListener('touchstart', arrancarMusicaForzado);
        document.addEventListener('keydown', arrancarMusicaForzado);


        // 2. QUERY REAL DE DISCORD (Lanyard API)
        async function checkDiscordStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${discordUserID}`);
                const resData = await response.json();
                
                if (resData.success && resData.data) {
                    const data = resData.data;
                    const statusText = document.getElementById('discord-status');
                    
                    // Definir estados básicos
                    let visualStatus = "Offline 💤";
                    if (data.discord_status === "online") visualStatus = "Online 🟢";
                    if (data.discord_status === "idle") visualStatus = "Idle 🌙";
                    if (data.discord_status === "dnd") visualStatus = "Do Not Disturb 🔴";

                    // Verificar si está jugando o haciendo algo específico
                    if (data.activities && data.activities.length > 0) {
                        // Buscar actividad tipo juego (type 0)
                        const game = data.activities.find(act => act.type === 0);
                        if (game) {
                            visualStatus += ` | Jugando a ${game.name}`;
                        } else if (data.activities[0].state) {
                            // Si tiene un estado personalizado en texto
                            visualStatus += ` | ${data.activities[0].state}`;
                        }
                    }
                    
                    statusText.innerText = visualStatus;
                }
            } catch (err) {
                document.getElementById('discord-status').innerText = "Status offline";
            }
        }

        // Ejecutar consulta de Discord al entrar y actualizar cada 15 segundos
        window.addEventListener('DOMContentLoaded', () => {
            checkDiscordStatus();
            setInterval(checkDiscordStatus, 15000);
        });
    </script>
</body>
</html>
