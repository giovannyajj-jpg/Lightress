<body>

    <div class="profile-container">

            <img src="https://cdn.discordapp.com/avatars/1249562581811593227/e2ecd7dbdf95f91ab30a9ccd818dc601.png?size=2048" alt="Foto de perfil" class="profile-pic">

    <script>
        // Función para forzar la reproducción si el navegador bloqueó el Autoplay al conectar o actualizar
        function activarMusica() {
            var player = document.getElementById('audioPlayer');
            if (player) {
                player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            }
        }

        // Al tocar o hacer clic en cualquier lado, se asegura de romper el bloqueo musical
        document.addEventListener('click', activarMusica);
        document.addEventListener('touchstart', activarMusica);
    </script>
