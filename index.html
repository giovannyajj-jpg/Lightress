<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕳𝖊𝖆𝖛𝖞</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* PANTALLA DE ENTRADA ESTILO GUNS.LOL */
        #enter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .enter-text {
            font-family: sans-serif;
            font-size: 20px;
            color: #ffffff;
            letter-spacing: 1px;
            opacity: 0.8;
            animation: pulseText 2.5s infinite ease-in-out;
        }

        @keyframes pulseText {
            0% { opacity: 0.3; text-shadow: 0 0 4px rgba(255,255,255,0.1); }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
            100% { opacity: 0.3; text-shadow: 0 0 4px rgba(255,255,255,0.1); }
        }

        /* Estilo para tu nueva descripción */
        .bio {
            font-size: 14px;
            color: #b3b3b3;
            margin-top: -5px;
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="enter-overlay" onclick="comenzarPerfil()">
        <div class="enter-text">click to enter...</div>
    </div>

    <div id="music-container" style="position: absolute; left: -9999px; top: -9999px; opacity: 0; pointer-events: none;"></div>

    <div class="background-overlay"></div>

    <div class="snowflakes" aria-hidden="true">
        <div class="snowflake">💤</div><div class="snowflake">❆</div><div class="snowflake">❅</div>
        <div class="snowflake">💤</div><div class="snowflake">❅</div><div class="snowflake">❆</div>
        <div class="snowflake">💤</div><div class="snowflake">❆</div><div class="snowflake">❅</div>
    </div>

    <div class="profile-container">
        <div class="profile-pic-wrapper">
            <img src="https://cdn.discordapp.com/avatars/1249562581811593227/e2ecd7dbdf95f91ab30a9ccd818dc601.png?size=2048" alt="Foto de perfil" class="profile-pic">
        </div>

        <h1 class="username">𝕳𝖊𝖆𝖛𝖞</h1>

        <div class="handles">
            <p>@.666is / @SnazzyX2630</p>
        </div>

        <div class="bio">NodeJS dev and css</div>

        <div class="location">
            <i class="fas fa-map-marker-alt"></i> From Ecuador 🇪🇨
        </div>

        <div class="status-widget glass">
            <img src="https://cdn.discordapp.com/avatars/1249562581811593227/e2ecd7dbdf95f91ab30a9ccd818dc601.png?size=2048" alt="Avatar Status" class="status-avatar">
            <div class="status-info">
                <div class="status-name">.666is <i class="fa-solid fa-bolt"></i> <i class="fa-brands fa-discord"></i></div>
                <div class="status-time">last seen 4 hours ago</div>
            </div>
        </div>

        <div class="social-links">
            <a href="TU_LINK_DE_DISCORD" target="_blank" class="glass-btn"><i class="fab fa-discord"></i></a>
            <a href="TU_LINK_DE_YOUTUBE" target="_blank" class="glass-btn"><i class="fab fa-youtube"></i></a>
            <a href="TU_LINK_DE_SPOTIFY" target="_blank" class="glass-btn"><i class="fab fa-spotify"></i></a>
            <a href="TU_LINK_DE_TIKTOK" target="_blank" class="glass-btn"><i class="fab fa-tiktok"></i></a>
        </div>

        <div class="views-counter">
            <i class="fas fa-eye"></i> 1807
        </div>
    </div>

    <script>
        function comenzarPerfil() {
            // 1. Hace desaparecer la pantalla negra con un efecto suave
            const overlay = document.getElementById('enter-overlay');
            overlay.style.opacity = '0';
            
            // Quita el overlay por completo del flujo después de la transición
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 600);

            // 2. Inyecta el iframe de YouTube usando la interacción directa del clic
            // Esto burla al 100% las restricciones de los navegadores locales y móviles
            const videoID = "GX8Hg6kWQYI";
            const musicBox = document.getElementById('music-container');
            
            musicBox.innerHTML = `<iframe width="100" height="100" src="https://www.youtube.com/embed/${videoID}?autoplay=1&loop=1&playlist=${videoID}" frameborder="0" allow="autoplay"></iframe>`;
        }
    </script>
</body>
</html>
